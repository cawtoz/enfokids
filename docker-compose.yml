services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-enfokids}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME:-enfokids}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./enfokids-api
    restart: unless-stopped
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/${DATABASE_NAME:-enfokids}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      HIBERNATE_DDL_AUTO: ${HIBERNATE_DDL_AUTO:-update}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_EXPIRATION_TIME: ${JWT_EXPIRATION_TIME:-86400000}
      APP_DATA_INIT: ${APP_DATA_INIT:-false}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./enfokids-client
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 4321
    ports:
      - "4321:4321"
    depends_on:
      - api

volumes:
  postgres_data:
